<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Özel...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="message-container">

    <div class="label">Kaydın Silinmesine Kalan Süre</div>

    <div class="countdown-wrapper">
        <svg width="160" height="160">
            <circle stroke="#eee" stroke-width="10" fill="transparent" r="70" cx="80" cy="80"/>
            <circle id="progress-bar" stroke="#d36c8a" stroke-width="10" fill="transparent" r="70" cx="80" cy="80"/>
        </svg>

        <div id="countdown-container">
            <div class="time-box">
                <span id="minutes">--</span><small>DK</small>
            </div>
            <div class="time-box">
                <span id="seconds">--</span><small>SN</small>
            </div>
        </div>
    </div>

    <div id="message">
        <span id="text-content">Yükleniyor...</span>
    </div>

</div>

<script type="module" src="main.js"></script>
</body>
</html>
